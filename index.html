<!DOCTYPE html>
<html>
<head>
<title>P.E.R.A. Archive</title>

<style>
body {
    margin: 0;
    background-color: #e8dcc0;
    font-family: monospace;

    background-image: linear-gradient(
        rgba(0,0,0,0.02) 1px,
        transparent 1px
    );
    background-size: 100% 4px;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(rgba(0,0,0,0.03), transparent 70%);
    pointer-events: none;
}

/* HEADER */
h1 {
    text-align: center;
    border-bottom: 2px solid #1a1a1a;
    padding: 10px;
    margin: 0;
}

p {
    text-align: center;
}

/* REMOVE BLUE LINKS */
a {
    color: inherit;
    text-decoration: none;
}

/* LAYOUT */
.layout {
    display: flex;
    min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background-color: #cbb88a;
    padding: 20px;
    border-right: 2px solid #a5946a;
}

#searchBar {
    width: 100%;
    padding: 8px;
    margin: 10px 0 20px 0;
    border: 2px solid #a5946a;
    background: #f5ecd7;
    box-sizing: border-box;
}

/* DRAWERS */
.drawer {
    margin-bottom: 10px;
}

.drawer-title {
    background: #bda97a;
    padding: 10px;
    cursor: pointer;
    border: 1px solid #a5946a;
    font-weight: bold;
}

.drawer-content {
    display: none;
    padding-left: 10px;
}

/* CONTENT */
.content {
    flex: 1;
    padding: 20px;
}

/* CATEGORY GRID */
.category {
    display: none;
    grid-template-columns: repeat(auto-fit, minmax(250px, 300px));
    justify-content: center;
    gap: 20px;
}

.category.active {
    display: grid;
}

/* FILE CARD (NOW LINK) */
.file {
    display: block;
    background: #d9c89e;
    border: 2px solid #a5946a;
    padding: 18px;
    position: relative;
    box-shadow: 6px 6px 0px #a5946a;
    cursor: pointer;
    transition: 0.25s ease;
}

.file:hover {
    transform: translateY(-8px);
    background: #cbb88a;
    box-shadow: 12px 12px 0px #a5946a;
}

.file::before {
    content: "";
    position: absolute;
    top: -14px;
    left: 14px;
    width: 95px;
    height: 20px;
    background: #cbb88a;
    border: 2px solid #a5946a;
    border-bottom: none;
}

.file::after {
    content: "CASE FILE";
    position: absolute;
    top: 6px;
    right: 10px;
    font-size: 10px;
    opacity: 0.55;
}

.file img {
    width: 80%;
    display: block;
    margin: 12px auto 0;
    border: 1px solid #a5946a;
}

/* HIDDEN */
.hidden {
    display: none !important;
}

/* VIEWER (NOT USED ANYMORE BUT LEFT SAFE) */
.viewer {
    display: none;
}

/* DOCUMENT STYLE */
.document h1 {
    text-align: left;
    border-bottom: 2px solid #000;
    padding-bottom: 5px;
}

.stamp {
    display: inline-block;
    padding: 6px 14px;
    border: 3px solid red;
    color: red;
    font-weight: bold;
    transform: rotate(-8deg);
    margin-bottom: 15px;
}

.section {
    margin-top: 20px;
}

.label {
    font-weight: bold;
    text-transform: uppercase;
    font-size: 12px;
}

.doc-image {
    width: 60%;
    display: block;
    margin: 20px auto;
    border: 2px solid #999;
}

.redacted {
    background: black;
    color: black;
    padding: 2px 5px;
}

    .back-btn {
    display: inline-block;
    margin-bottom: 15px;
    padding: 8px 12px;
    background: #d9c89e;
    border: 1px solid #a5946a;
    cursor: pointer;
    font-family: monospace;
}

.back-btn:hover {
    background: #cbb88a;
}
</style>
</head>

<body>

<h1>PARANORMAL RESEARCH ARCHIVE</h1>
<p>WARNING: Unauthorized access will be logged.</p>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>DATABASE</h2>

<p id="counter">TOTAL FILES: 2</p>

<input type="text" id="searchBar" placeholder="Search files..." onkeyup="searchFiles()">

<div class="drawer">
<div class="drawer-title" onclick="toggleDrawer(this)">Axis I</div>
<div class="drawer-content">
<button onclick="showCategory('animal_predators')">Predators</button>
</div>
</div>

</div>

<!-- CONTENT -->
<div class="content">

<div id="animal_predators" class="category active">

<a href="subject001.html" class="file">
<h3>SUBJECT-001</h3>
<p>Whisperwing</p>
<img src="Monster 1.png">
</a>

<a href="subject002.html" class="file">
<h3>SUBJECT-002</h3>
<p>Heartbeat</p>
<img src="https://via.placeholder.com/200">
</a>

</div>

</div>
</div>

<script>
function showCategory(category) {
document.querySelectorAll('.category').forEach(div => div.classList.remove('active'));
document.getElementById(category).classList.add('active');
}

function searchFiles() {
let input = document.getElementById("searchBar").value.toLowerCase();
document.querySelectorAll(".file").forEach(file => {
file.classList.toggle("hidden", !file.innerText.toLowerCase().includes(input));
});
}

function toggleDrawer(el) {
el.nextElementSibling.style.display =
el.nextElementSibling.style.display === "block" ? "none" : "block";
}

    function openFile(id) {
let content = document.getElementById(id).innerHTML;

document.getElementById("viewerContent").innerHTML =
'<div class="back-btn" onclick="closeViewer()">← BACK TO ARCHIVE</div>' + content;

document.getElementById("viewer").classList.add("active");
}

function closeViewer() {
document.getElementById("viewer").classList.remove("active");
}
</script>

</body>
</html>
