<!DOCTYPE html>
<html>
<head>
<title>P.E.R.A. Archive</title>

<style>
body {
    margin: 0;
    background-color: #e8dcc0;
    font-family: monospace;
}

/* HEADER */
h1 {
    text-align: center;
    border-bottom: 2px solid #1a1a1a;
    padding: 10px;
    margin: 0;
}

p {
    text-align: center;
}

/* SEARCH */
#searchBar {
    width: calc(100% - 40px);
    margin: 10px 20px;
    padding: 10px;
    font-family: monospace;
    border: 2px solid #a5946a;
    background: #f5ecd7;
}

/* LINKS */
a {
    color: #1a1a1a;
    text-decoration: none;
}

/* LAYOUT */
.layout {
    display: flex;
    min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 200px;
    background-color: #cbb88a;
    padding: 20px;
    border-right: 2px solid #a5946a;
}

.sidebar button {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    background-color: #d9c89e;
    border: 1px solid #a5946a;
    cursor: pointer;
}

/* CONTENT */
.content {
    flex: 1;
    padding: 20px;
}

/* CATEGORY GRID */
.category {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 300px));
    justify-content: center;
    gap: 20px;
}

/* FILE CARD (folder style) */
.file {
    background: #d9c89e;
    border: 2px solid #a5946a;
    padding: 15px;
    position: relative;
    box-shadow: 4px 4px 0px #a5946a;
    transition: 0.2s;
    overflow: hidden;
}

.file:hover {
    transform: translateY(-6px) rotate(-1deg);
    background: #cbb88a;
}

/* folder tab */
.file::before {
    content: "";
    position: absolute;
    top: -12px;
    left: 12px;
    width: 80px;
    height: 18px;
    background: #cbb88a;
    border: 2px solid #a5946a;
    border-bottom: none;
}

.file::after {
    content: "FILE";
    position: absolute;
    top: 5px;
    right: 10px;
    font-size: 10px;
    opacity: 0.6;
}

/* IMAGE */
.file img {
    width: 100%;
    height: auto;
    margin-top: 10px;
    border: 1px solid #a5946a;
}

/* SEARCH HIDE FIX */
.hidden {
    display: none !important;
}
</style>
</head>

<body>

<h1>PARANORMAL ENTITY RESEARCH AGENCY DATABASE</h1>
<p>WARNING: Unauthorized access will be logged.</p>

<input type="text" id="searchBar" placeholder="Search subjects..." onkeyup="searchFiles()">

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>DATABASE</h2>
        <button onclick="showCategory('animals')">Animal-like</button>
        <button onclick="showCategory('amalgamations')">Amalgamations</button>
        <button onclick="showCategory('supernatural')">Supernatural</button>
        <button onclick="showCategory('other')">Other</button>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <div id="animals" class="category">

            <div class="file">
                <a href="subject001.html">
                    <h3>SUBJECT-001</h3>
                    <p>Whisperwing</p>
                    <img src="Monster 1.png">
                </a>
            </div>

            <div class="file">
                <a href="subject002.html">
                    <h3>SUBJECT-002</h3>
                    <p>Heartbeat</p>
                    <img src="https://via.placeholder.com/200">
                </a>
            </div>

        </div>

        <div id="amalgamations" class="category" style="display:none;"></div>
        <div id="supernatural" class="category" style="display:none;"></div>
        <div id="other" class="category" style="display:none;"></div>

    </div>

</div>

<script>
function showCategory(category) {
    document.querySelectorAll('.category').forEach(div => {
        div.style.display = 'none';
    });
    document.getElementById(category).style.display = 'grid';
}

function searchFiles() {
    let input = document.getElementById("searchBar").value.toLowerCase();
    let files = document.querySelectorAll(".file");

    files.forEach(file => {
        let text = file.innerText.toLowerCase();

        if (text.includes(input)) {
            file.classList.remove("hidden");
        } else {
            file.classList.add("hidden");
        }
    });
}
</script>

</body>
</html>
