<!DOCTYPE html>
<html>
<head>
    <title>P.E.R.A. Archive</title>
    <style>
        body {
            background-color: #e8dcc0; /* paper color */
    color: #1a1a1a;
    font-family: monospace;
    padding: 20px;
            a {
    color: #1a1a1a;
    text-decoration: none;
}

a:visited {
    color: #1a1a1a;
}

a:hover {
    text-decoration: underline;
}
            h1 {
    text-align: center;
    border-bottom: 2px solid #1a1a1a;
    padding-bottom: 10px;
}
        h1 {
            text-align: center;
        }
        .file {
            border: 1px solid #00ff9f;
            padding: 10px;
            margin: 10px 0;
        }
            .container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 300px));
    justify-content: center;
    gap: 30px;
}

.file {
    background-color: #d9c89e; /* folder color */
    border: 2px solid #b5a474;
    padding: 15px;
    text-align: center;
    max-width: 300px;
    box-shadow: 4px 4px 0px #b5a474;
}
             img {
    width: 100%;
    height: auto;
    margin-top: 10px;
}
            .file:hover {
    background-color: #cbb88a; /* slightly darker folder color */
    transform: translateY(-5px);
    transition: 0.2s;
}
            .file a {
    display: block;
}
            }

        .layout {
    display: flex;
}

.sidebar {
    width: 200px;
    background-color: #cbb88a;
    padding: 20px;
    border-right: 2px solid #a5946a;
}

.sidebar button {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    background-color: #d9c89e;
    border: 1px solid #a5946a;
    cursor: pointer;
}

.content {
    flex: 1;
    padding: 20px;
}

.category {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 300px));
    justify-content: center;
    gap: 20px;
}

.file {
    background-color: #d9c89e;
    border: 2px solid #a5946a;
    padding: 15px;
    box-shadow: 4px 4px 0px #a5946a;
    transition: 0.2s;
}

.file:hover {
    transform: rotate(-2deg) scale(1.03);
    background-color: #cbb88a;
}

.file a {
    display: block;
    color: black;
    text-decoration: none;
}
    </style>
</head>

    <script>
function showCategory(category) {
    document.querySelectorAll('.category').forEach(div => {
        div.style.display = 'none';
    });
    document.getElementById(category).style.display = 'grid';
}
</script>
    
<body>

<h1>PARANORMAL ENTITY RESEARCH AGENCY DATABASE</h1>
<p>WARNING: Unauthorized access will be logged.</p>

<div class="container">

   <div class="layout">

    <div class="sidebar">
        <h2>DATABASE</h2>
        <button onclick="showCategory('animals')">Animal-like</button>
        <button onclick="showCategory('amalgamations')">Amalgamations</button>
        <button onclick="showCategory('supernatural')">Supernatural</button>
        <button onclick="showCategory('other')">Other</button>
    </div>

    <div class="content">

        <div id="animals" class="category">

            <div class="file">
                <a href="subject001.html">
                    <h3>SUBJECT-001</h3>
                    <p>Whisperwing</p>
                    <img src="monster1.png">
                </a>
            </div>

        </div>

        <div id="amalgamations" class="category" style="display:none;"></div>
        <div id="supernatural" class="category" style="display:none;"></div>
        <div id="other" class="category" style="display:none;"></div>

    </div>

    <div class="file">
        <a href="subject002.html">
            <h2>SUBJECT-002</h2>
            <p>Codename: "Heartbeat"</p>
            <img src="https://via.placeholder.com/200">
        </a>
    </div>

</div>
