<!DOCTYPE html>
<html>
<head>
<title>P.E.R.A. Archive</title>

<style>
body {
    margin: 0;
    background-color: #e8dcc0;
    font-family: monospace;
}

/* HEADER */
h1 {
    text-align: center;
    border-bottom: 2px solid #1a1a1a;
    padding: 10px;
    margin: 0;
}

p {
    text-align: center;
}

/* LINKS */
a {
    color: #1a1a1a;
    text-decoration: none;
}

a:visited {
    color: #1a1a1a;
}

a:hover {
    text-decoration: underline;
}

/* LAYOUT */
.layout {
    display: flex;
    min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 200px;
    background-color: #cbb88a;
    padding: 20px;
    border-right: 2px solid #a5946a;
}

.sidebar button {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    background-color: #d9c89e;
    border: 1px solid #a5946a;
    cursor: pointer;
}

/* CONTENT AREA */
.content {
    flex: 1;
    padding: 20px;
}

/* CATEGORY GRID */
.category {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 300px));
    justify-content: center;
    gap: 20px;
}

/* FILE CARDS */
.file {
    background-color: #d9c89e;
    border: 2px solid #a5946a;
    padding: 15px;
    position: relative;
    box-shadow: 4px 4px 0px #a5946a;
    transition: 0.2s;
}

.file:hover {
    transform: translateY(-5px) rotate(-1deg);
    background-color: #cbb88a;
}

.file::before {
    content: "";
    position: absolute;
    top: -10px;
    left: 10px;
    width: 60px;
    height: 15px;
    background-color: #cbb88a;
    border: 2px solid #a5946a;
    border-bottom: none;
}

.file img {
    width: 100%;
    height: auto;
    margin-top: 10px;
    border: 1px solid #a5946a;
}

.file a {
    display: block;
    color: black;
    text-decoration: none;
}
</style>
</head>

<body>

<h1>PARANORMAL ENTITY RESEARCH AGENCY DATABASE</h1>
<p>WARNING: Unauthorized access will be logged.</p>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>DATABASE</h2>
        <button onclick="showCategory('animals')">Animal-like</button>
        <button onclick="showCategory('amalgamations')">Amalgamations</button>
        <button onclick="showCategory('supernatural')">Supernatural</button>
        <button onclick="showCategory('other')">Other</button>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <div id="animals" class="category">

            <div class="file">
                <a href="subject001.html">
                    <h3>SUBJECT-001</h3>
                    <p>Whisperwing</p>
                    <img src="Monster 1.png">
                </a>
            </div>

            <div class="file">
                <a href="subject002.html">
                    <h3>SUBJECT-002</h3>
                    <p>Heartbeat</p>
                    <img src="https://via.placeholder.com/200">
                </a>
            </div>

        </div>

        <div id="amalgamations" class="category" style="display:none;"></div>
        <div id="supernatural" class="category" style="display:none;"></div>
        <div id="other" class="category" style="display:none;"></div>

    </div>

</div>

<script>
function showCategory(category) {
    document.querySelectorAll('.category').forEach(div => {
        div.style.display = 'none';
    });
    document.getElementById(category).style.display = 'grid';
}
</script>

</body>
</html>
