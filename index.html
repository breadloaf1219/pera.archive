<!DOCTYPE html>
<html>
<head>
<title>P.E.R.A. Archive</title>

<style>
body {
    margin: 0;
    background-color: #e8dcc0;
    font-family: monospace;

    background-image: linear-gradient(
        rgba(0,0,0,0.02) 1px,
        transparent 1px
    );
    background-size: 100% 4px;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(rgba(0,0,0,0.03), transparent 70%);
    pointer-events: none;
}

/* HEADER */
h1 {
    text-align: center;
    border-bottom: 2px solid #1a1a1a;
    padding: 10px;
    margin: 0;
}

p {
    text-align: center;
}

/* LAYOUT */
.layout {
    display: flex;
    min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background-color: #cbb88a;
    padding: 20px;
    border-right: 2px solid #a5946a;
}

.sidebar h2 {
    margin-top: 0;
}

#searchBar {
    width: 100%;
    padding: 8px;
    margin: 10px 0 20px 0;
    border: 2px solid #a5946a;
    background: #f5ecd7;
    box-sizing: border-box;
}

.sidebar button {
    display: block;
    width: 100%;
    margin: 6px 0;
    padding: 8px;
    background-color: #d9c89e;
    border: 1px solid #a5946a;
    cursor: pointer;
}

.sidebar button:hover {
    background-color: #cbb88a;
}

/* DRAWERS */
.drawer {
    margin-bottom: 10px;
}

.drawer-title {
    background: #bda97a;
    padding: 10px;
    cursor: pointer;
    border: 1px solid #a5946a;
    font-weight: bold;
}

.drawer-content {
    display: none;
    padding-left: 10px;
}

/* CONTENT */
.content {
    flex: 1;
    padding: 20px;
}

/* CATEGORY GRID */
.category {
    display: none;
    grid-template-columns: repeat(auto-fit, minmax(250px, 300px));
    justify-content: center;
    gap: 20px;
}

.category.active {
    display: grid;
}

/* FILE */
.file {
    background: #d9c89e;
    border: 2px solid #a5946a;
    padding: 18px 15px 15px 15px;
    position: relative;
    box-shadow: 6px 6px 0px #a5946a;
    transition: 0.25s ease;
}

.file:hover {
    transform: translateY(-8px);
    background: #cbb88a;
    box-shadow: 12px 12px 0px #a5946a;
}

.file::before {
    content: "";
    position: absolute;
    top: -14px;
    left: 14px;
    width: 95px;
    height: 20px;
    background: #cbb88a;
    border: 2px solid #a5946a;
    border-bottom: none;
}

.file::after {
    content: "CASE FILE";
    position: absolute;
    top: 6px;
    right: 10px;
    font-size: 10px;
    opacity: 0.55;
}

.file img {
    width: 80%;
    display: block;
    margin: 12px auto 0 auto;
    border: 1px solid #a5946a;
}

.file a {
    text-decoration: none;
    color: black;
}

/* hidden */
.hidden {
    display: none !important;
}
</style>
</head>

<body>

<h1>PARANORMAL RESEARCH ARCHIVE</h1>
<p>WARNING: Unauthorized access will be logged.</p>

<div class="layout">

<div class="sidebar">
<h2>DATABASE</h2>

<input type="text" id="searchBar" placeholder="Search subjects..." onkeyup="searchFiles()">

<div class="drawer">
<div class="drawer-title" onclick="toggleDrawer(this)">BIOLOGICAL</div>
<div class="drawer-content">
<button onclick="showCategory('animal_predators')">Predatory</button>
<button onclick="showCategory('animal_passive')">Passive</button>
</div>
</div>

<div class="drawer">
<div class="drawer-title" onclick="toggleDrawer(this)">AMALGAMATIONS</div>
<div class="drawer-content">
<button onclick="showCategory('fusion_entities')">Fusion</button>
<button onclick="showCategory('corrupted_forms')">Corrupted</button>
</div>
</div>

<div class="drawer">
<div class="drawer-title" onclick="toggleDrawer(this)">SUPERNATURAL</div>
<div class="drawer-content">
<button onclick="showCategory('spectral')">Spectral</button>
<button onclick="showCategory('dimensional')">Dimensional</button>
</div>
</div>

</div>

<div class="content">

<!-- BIOLOGICAL -->
<div id="animal_predators" class="category active">

<div class="file">
<a href="subject001.html">
<h3>SUBJECT-001</h3>
<p>Whisperwing</p>
<img src="Monster 1.png">
</a>
</div>

<div class="file">
<a href="subject002.html">
<h3>SUBJECT-002</h3>
<p>Heartbeat</p>
<img src="https://via.placeholder.com/200">
</a>
</div>

</div>

<div id="animal_passive" class="category"></div>

<!-- OTHER CATEGORIES -->
<div id="fusion_entities" class="category"></div>
<div id="corrupted_forms" class="category"></div>
<div id="spectral" class="category"></div>
<div id="dimensional" class="category"></div>

</div>

</div>

<script>
function showCategory(category) {
document.querySelectorAll('.category').forEach(div => {
div.classList.remove('active');
});
document.getElementById(category).classList.add('active');
}

function searchFiles() {
let input = document.getElementById("searchBar").value.toLowerCase();
let files = document.querySelectorAll(".file");

files.forEach(file => {
let text = file.innerText.toLowerCase();

if (text.includes(input)) {
file.classList.remove("hidden");
} else {
file.classList.add("hidden");
}
});
}

function toggleDrawer(element) {
let content = element.nextElementSibling;
content.style.display = content.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
