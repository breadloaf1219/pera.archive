<!DOCTYPE html>
<html>
<head>
<title>P.E.R.A. Archive</title>

<style>
body {
    margin: 0;
    background-color: #e8dcc0;
    font-family: monospace;

    /* subtle paper grain effect */
    background-image: linear-gradient(
        rgba(0,0,0,0.02) 1px,
        transparent 1px
    );
    background-size: 100% 4px;
}
    
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(
        rgba(0,0,0,0.03),
        transparent 70%
    );
    pointer-events: none;
}
    
/* HEADER */
h1 {
    text-align: center;
    border-bottom: 2px solid #1a1a1a;
    padding: 10px;
    margin: 0;
}

p {
    text-align: center;
}

/* SEARCH */
#searchBar {
    width: 100%;
    padding: 8px;
    margin: 10px 0 15px 0;
    font-family: monospace;
    border: 2px solid #a5946a;
    background: #f5ecd7;
    box-sizing: border-box;
}

/* LINKS */
a {
    color: #1a1a1a;
    text-decoration: none;
}

/* LAYOUT */
.layout {
    display: flex;
    min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 200px;
    background-color: #cbb88a;
    padding: 20px;
    border-right: 2px solid #a5946a;
}

.sidebar button {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    background-color: #d9c89e;
    border: 1px solid #a5946a;
    cursor: pointer;
}

/* CONTENT */
.content {
    flex: 1;
    padding: 20px;
}

/* CATEGORY GRID */
.category {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 300px));
    justify-content: center;
    gap: 20px;
}

/* FILE CARD (folder style) */
.file {
    background: #d9c89e;
    border: 2px solid #a5946a;
    padding: 18px 15px 15px 15px;
    position: relative;
    box-shadow: 6px 6px 0px #a5946a;
    transition: 0.25s ease;
    overflow: visible;
}

/* hover feels like folder lifting */
.file:hover {
    transform: translateY(-8px) rotate(-0.5deg);
    background: #cbb88a;
    box-shadow: 12px 12px 0px #a5946a;
}

/* folder tab (stronger + connected feel) */
.file::before {
    content: "";
    position: absolute;
    top: -14px;
    left: 14px;
    width: 95px;
    height: 20px;
    background: #cbb88a;
    border: 2px solid #a5946a;
    border-bottom: none;
}

/* label strip */
.file::after {
    content: "CASE FILE";
    position: absolute;
    top: 6px;
    right: 10px;
    font-size: 10px;
    opacity: 0.55;
}


/* IMAGE */
.file img {
    width: 80%;
    height: auto;
    margin-top: 12px;
    border: 1px solid #a5946a;
    display: block;
    margin-left: auto;
    margin-right: auto;
}
    
.file:active {
    transform: translateY(-2px) scale(0.99);
}

.file a {
    display: block;
    color: black;
    text-decoration: none;
}
    
/* SEARCH HIDE FIX */
.hidden {
    display: none !important;
}
</style>
</head>

<body>

<h1>PARANORMAL ENTITY DATABASE</h1>
<p>WARNING: Unauthorized access will be logged.</p>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
    <h2>DATABASE</h2>

    <input type="text" id="searchBar" placeholder="Search subjects..." onkeyup="searchFiles()">

    <button onclick="showCategory('animals')">Animal-like</button>
    <button onclick="showCategory('amalgamations')">Amalgamations</button>
    <button onclick="showCategory('supernatural')">Supernatural</button>
    <button onclick="showCategory('other')">Other</button>
</div>

    <!-- CONTENT -->
    <div class="content">

        <div id="animals" class="category">

            <div class="file">
                <a href="subject001.html">
                    <h3>SUBJECT-001</h3>
                    <p>Whisperwing</p>
                    <img src="Monster 1.png">
                </a>
            </div>

            <div class="file">
                <a href="subject002.html">
                    <h3>SUBJECT-002</h3>
                    <p>Heartbeat</p>
                    <img src="https://via.placeholder.com/200">
                </a>
            </div>

        </div>

        <div id="amalgamations" class="category" style="display:none;"></div>
        <div id="supernatural" class="category" style="display:none;"></div>
        <div id="other" class="category" style="display:none;"></div>

    </div>

</div>

<script>
function showCategory(category) {
    document.querySelectorAll('.category').forEach(div => {
        div.style.display = 'none';
    });
    document.getElementById(category).style.display = 'grid';
}

function searchFiles() {
    let input = document.getElementById("searchBar").value.toLowerCase();
    let files = document.querySelectorAll(".file");

    files.forEach(file => {
        let text = file.innerText.toLowerCase();

        if (text.includes(input)) {
            file.classList.remove("hidden");
        } else {
            file.classList.add("hidden");
        }
    });
}
</script>

</body>
</html>
